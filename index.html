<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Drop Timer Manager</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <h1>Drop Timer Manager</h1>

    <div class="input-area">
      <input type="text" id="stageName" placeholder="ステージ名を入力">

      <input type="number" id="minutes" placeholder="分" min="0">

      <input type="number" id="seconds" placeholder="秒" min="0" max="59">

      <button id="newTimerBtn">New Timer</button>
    </div>

    <div id="timerList"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
